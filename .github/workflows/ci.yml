name: CI
on: [ push, pull_request ]
jobs:
  build-and-test:
    name: 构建和测试
    runs-on: ubuntu-latest
    steps:

      - name: 签出代码
        uses: actions/checkout@v3

      - name: 安装 JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: 使用 Maven 进行构建和测试
        run: mvn package --batch-mode
